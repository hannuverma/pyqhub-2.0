name: Node.js CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # Optional: Add postgres if you want integration tests instead of mocks
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefix backend && npm ci --prefix frontend

      - name: Generate Prisma Client
        run: npm run db:generate --prefix backend

      - name: Run Tests
        run: npm test --prefix backend
        env:
          DATABASE_URL: 'postgresql://postgres:password@localhost:5432/testdb'
          JWT_SECRET: 'super-secret-ci-key'
          JWT_REFRESH_SECRET: 'refresh-secret-ci-key'
          CLOUDINARY_CLOUD_NAME: 'test'
          CLOUDINARY_API_KEY: 'test'
          CLOUDINARY_API_SECRET: 'test'

        # Add this step before running logic tests
      - name: Check Formatting (Prettier)
        run: npx prettier --check .

      - name: Run logic tests
        run: npm test --prefix backend
